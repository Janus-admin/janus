apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "janus.fullname" . }}
  labels: {{- include "janus.labels" . | nindent 4 }}
data:
  # Non-secret runtime config. Anything sensitive lives in the Secret rendered
  # by secret.yaml. Each entry maps to an env var consumed by Config::load().
  HOST: {{ .Values.config.host | quote }}
  PORT: {{ .Values.config.port | quote }}
  JWT_EXPIRATION_HOURS: {{ .Values.config.jwtExpirationHours | quote }}

  CACHE_ENABLED: {{ .Values.config.cacheEnabled | quote }}
  SEMANTIC_CACHE_BACKEND: {{ .Values.config.semanticCacheBackend | quote }}
  SEMANTIC_CACHE_THRESHOLD: {{ .Values.config.semanticCacheThreshold | quote }}

  QDRANT_URL: {{ .Values.config.qdrantUrl | quote }}
  QDRANT_COLLECTION: {{ .Values.config.qdrantCollection | quote }}
  QDRANT_VECTOR_SIZE: {{ .Values.config.qdrantVectorSize | quote }}

  RATE_LIMIT_WINDOW_SECS: {{ .Values.config.rateLimitWindowSecs | quote }}
  MAX_RETRIES: {{ .Values.config.maxRetries | quote }}

  CLUSTER_ENABLED: {{ .Values.config.cluster.enabled | quote }}
  {{- with .Values.config.cluster.nodeId }}
  CLUSTER_NODE_ID: {{ . | quote }}
  {{- end }}

  EMBEDDING_MODEL_PATH: {{ printf "%s/all-MiniLM-L6-v2.onnx" .Values.models.mountPath | quote }}
  EMBEDDING_TOKENIZER_PATH: {{ printf "%s/tokenizer.json" .Values.models.mountPath | quote }}
