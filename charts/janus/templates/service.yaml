apiVersion: v1
kind: Service
metadata:
  name: {{ include "janus.fullname" . }}
  labels: {{- include "janus.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector: {{- include "janus.selectorLabels" . | nindent 4 }}
