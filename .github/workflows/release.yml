name: Release

on:
  push:
    tags:
      - 'v*'
  # Allow re-running from the Actions UI without re-tagging
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v0.2.0)'
        required: true

env:
  CARGO_TERM_COLOR: always
  # GHCR (and any Docker registry) requires lowercase repo names.
  # The org slug `janus-admin` is already lowercase, but hardcoding it
  # avoids any future tripping if someone forks under a mixed-case name.
  IMAGE_NAME: ghcr.io/janus-admin/janus

permissions:
  contents: write    # required to upload release assets
  packages: write    # required to push to GHCR

jobs:
  # ─── Cross-platform binary builds ──────────────────────────────────────────
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: darwin
            arch: arm64
            runner: macos-latest
            target: aarch64-apple-darwin
          - os: darwin
            arch: amd64
            runner: macos-13
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        env:
          SQLX_OFFLINE: "true"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux tar.gz)
        if: matrix.os == 'linux'
        run: |
          mkdir -p dist
          cd target/${{ matrix.target }}/release
          tar czf ../../../dist/janus-${{ inputs.tag || github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz janus

      - name: Package (macOS zip)
        if: matrix.os == 'darwin'
        run: |
          mkdir -p dist
          cd target/${{ matrix.target }}/release
          zip -q ../../../dist/janus-${{ inputs.tag || github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}.zip janus

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/janus-*
          fail_on_unmatched_files: true
          # If the release already exists (e.g. created from the UI), append
          # files to it instead of failing.
          generate_release_notes: false

  # ─── Multi-arch Docker image to GHCR ──────────────────────────────────────
  docker:
    name: Push image to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (cross-arch emulation for arm64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag name
        id: tag
        run: |
          NAME="${{ inputs.tag || github.ref_name }}"
          # strip leading 'v' for image tag — semver-style image tags don't usually carry 'v'
          STRIPPED="${NAME#v}"
          echo "version=$STRIPPED" >> "$GITHUB_OUTPUT"
          echo "full=$NAME"          >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.version }}
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.full }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
