name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Job 1: Check + Clippy + Format ─────────────────────────────────────────
  lint:
    name: Lint (clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check code compiles
        run: cargo check --all-targets

      - name: Clippy — zero warnings allowed
        run: cargo clippy --all-targets -- -D warnings

      - name: Format check
        run: cargo fmt -- --check

  # ─── Job 2: Tests ────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: velox_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/velox_test
      JWT_SECRET: test-jwt-secret-for-ci-only
      RUST_LOG: error

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run database migrations
        run: cargo run --bin velox -- migrate
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/velox_test

      - name: Run tests
        run: cargo test --all
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/velox_test
          JWT_SECRET: test-jwt-secret-for-ci-only

  # ─── Job 3: Build Release Binary ─────────────────────────────────────────────
  build:
    name: Build release
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release

      - name: Verify binary exists and runs
        run: |
          ./target/release/velox --version

  # ─── Job 4: Release Binaries (only on version tags) ──────────────────────────
  release:
    name: Release binaries
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    needs: [lint, test]

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: velox
            archive: velox-linux-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: velox
            archive: velox-macos-arm64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: velox
            archive: velox-macos-x86_64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} ${{ matrix.binary }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
