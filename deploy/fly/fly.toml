# Fly.io launch config for Velox.
#
# Usage:
#   fly launch --copy-config --no-deploy   # creates the app and reads this file
#   fly postgres create --name velox-pg     # provisions HA Postgres
#   fly postgres attach --app <app> velox-pg
#   fly secrets set JWT_SECRET=$(openssl rand -hex 32) \
#                   ENCRYPTION_KEY=$(openssl rand -hex 32) \
#                   OPENAI_API_KEY=sk-...
#   fly deploy

app = "velox"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = 30

[build]
  dockerfile = "../../Dockerfile"

[env]
  RUST_LOG = "info,tower_http=warn"
  HOST = "0.0.0.0"
  PORT = "8080"
  CACHE_ENABLED = "true"
  SEMANTIC_CACHE_BACKEND = "linear"
  SEMANTIC_CACHE_THRESHOLD = "0.9"
  RATE_LIMIT_WINDOW_SECS = "60"
  MAX_RETRIES = "1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false        # gateway latency matters; keep machines hot
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

# Models live on a volume so Fly can warm-start them across deploys.
[mounts]
  source = "velox_models"
  destination = "/var/lib/velox/models"

[checks.alive]
  type = "tcp"
  port = 8080
  interval = "30s"
  timeout = "5s"
