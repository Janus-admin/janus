# Render Blueprint for Janus.
#
# Usage:
#   1. Push your fork to GitHub.
#   2. In the Render dashboard: New → Blueprint → connect this repo.
#   3. Render reads this file, provisions the services below, and asks for any
#      `sync: false` secrets (the provider keys + JWT/ENCRYPTION secrets).

services:
  - type: web
    name: janus
    runtime: docker
    plan: starter                       # bump to standard+ for production traffic
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: RUST_LOG
        value: "info,tower_http=warn"
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "8080"
      - key: CACHE_ENABLED
        value: "true"
      - key: SEMANTIC_CACHE_BACKEND
        value: "linear"
      - key: SEMANTIC_CACHE_THRESHOLD
        value: "0.9"
      - key: RATE_LIMIT_WINDOW_SECS
        value: "60"
      - key: MAX_RETRIES
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: janus-pg
          property: connectionString
      - key: JWT_SECRET
        generateValue: true             # Render generates a 32-byte random value
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false                     # caller supplies on first deploy
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: "us-east-1"

databases:
  - name: janus-pg
    plan: starter                       # 256 MB, fine for evaluation
    databaseName: janus
    user: janus
    ipAllowList: []                     # private network only
